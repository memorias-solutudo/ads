<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Funil Solutudo — Mind Map de Criativos</title>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  :root{
    --bg:#0f1216; --panel:#171c23; --line:#2a323d; --txt:#e6edf3; --muted:#9aa7b4;
    --verde:#2ea043; --amarelo:#d29922; --vermelho:#e5534b; --azul:#388bfd;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:flex;height:100vh}
  #cy{flex:1;height:100%}
  #side{width:380px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:20px}
  header{position:absolute;top:0;left:0;right:380px;padding:12px 18px;display:flex;gap:16px;align-items:center;
    background:linear-gradient(180deg,rgba(15,18,22,.95),rgba(15,18,22,0));pointer-events:none}
  header h1{font-size:16px;margin:0;pointer-events:auto}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted);pointer-events:auto}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .toolbar{margin-left:auto;display:flex;gap:8px;pointer-events:auto}
  button{background:#21262d;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px}
  button:hover{border-color:var(--azul)}
  #side h2{font-size:18px;margin:0 0 4px}
  #side .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#21262d;color:var(--muted);margin:0 6px 6px 0}
  #side h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:18px 0 6px;border-bottom:1px solid var(--line);padding-bottom:4px}
  #side p{font-size:13px;line-height:1.5;margin:6px 0;color:#cdd6df}
  #side .kv{font-size:13px;margin:4px 0}
  #side .kv b{color:var(--muted);font-weight:600}
  .status-existe{color:var(--verde)} .status-confirmar{color:var(--amarelo)} .status-falta{color:var(--vermelho)}
  .hint{color:var(--muted);font-size:12px;margin-top:30px;line-height:1.5}
  .vbtn{display:inline-block;background:#21262d;border:1px solid var(--azul);color:#cfe3ff;text-decoration:none;padding:5px 10px;border-radius:6px;font-size:12px;margin:4px 6px 4px 0}
  .vbtn:hover{background:#1f6feb;color:#fff}
</style>
</head>
<body>
<div id="app">
  <div id="cy"></div>
  <header>
    <h1>🎯 Funil Solutudo</h1>
    <div class="legend">
      <span><i class="dot" style="background:var(--verde)"></i>existe</span>
      <span><i class="dot" style="background:var(--amarelo)"></i>a confirmar</span>
      <span><i class="dot" style="background:var(--vermelho)"></i>falta produzir</span>
    </div>
    <div class="toolbar">
      <button onclick="cy.fit(null,40)">Centralizar</button>
    </div>
  </header>
  <div id="side">
    <p style="color:var(--muted)">Clique em um nó do mapa para ver os detalhes do card,
    a recomendação de plataforma e o estilo de criativo.</p>
    <p class="hint">Para adicionar um vídeo, edite o array <code>CARDS</code> neste arquivo.</p>
  </div>
</div>

<script>
/* ============ DADOS (edite aqui para evoluir o sistema) ============ */

// Jornadas = ramos do mind map. Cada uma traz a recomendação de plataforma.
const JORNADAS = {
  ATRACAO:    {nome:'Atração (topo)',        meta:'Reconhecimento / Engajamento (vídeo). Públicos frios amplos.', google:'Demand Gen (vídeo).', youtube:'In-stream pulável + Bumper 6s + Shorts.', kpi:'VTR, CPV, retenção'},
  CONFIANCA:  {nome:'Confiança (meio)',      meta:'Tráfego/Engajamento p/ mornos (viram vídeo).', google:'Demand Gen remarketing.', youtube:'In-stream pulável (rosto sentado) + In-feed.', kpi:'Tempo de visualização, cliques'},
  CADASTRO:   {nome:'Cadastro grátis',       meta:'Cadastros (Leads) — form instantâneo ou conversão no site.', google:'Search (intenção) + PMax.', youtube:'Vídeo de ação com CTA cadastro.', kpi:'CPL, taxa de cadastro'},
  LIVE:       {nome:'Live / Evento',         meta:'Tráfego p/ inscrição → remarketing de lembrete.', google:'Demand Gen + YouTube promo.', youtube:'In-stream + comunidade.', kpi:'Inscritos, comparecimento'},
  WHATSAPP:   {nome:'WhatsApp (bot)',        meta:'Engajamento → Cliques no WhatsApp / Mensagens (conversas).', google:'Search (secundário).', youtube:'Vídeo de ação c/ link.', kpi:'Conversas, qualificação high/low'},
  VSL:        {nome:'VSL → high ticket',     meta:'Vendas (Conversões) otimizando Agendamento. Mornos/quentes.', google:'PMax + Search + Demand Gen.', youtube:'In-stream longo (VSL) + Vídeo de ação.', kpi:'Agendamentos, show-up, CAC'},
  ANUNCIE:    {nome:'Anuncie → low ticket',  meta:'Vendas (Conversões) otimizando compra; remarketing quente.', google:'Search (alta intenção) + PMax.', youtube:'Vídeo de ação (remarketing).', kpi:'Vendas, ROAS, CPA'},
  REMARKETING:{nome:'Remarketing',           meta:'Vendas/Leads com Públicos Personalizados (visitantes, lista, video viewers).', google:'Display/Demand Gen remarketing + RLSA.', youtube:'In-feed/In-stream p/ listas.', kpi:'ROAS, frequência, CPA'},
};

// Estilos de criativo. Ver guia-criativos.md.
const ESTILOS = {
  'storytelling':   {nome:'Storytelling',        formato:'9:16 15–45s (ou 16:9 YouTube), hook 3s', porque:'Narrativa antes do CTA prende público frio criando contexto/tensão.'},
  'rosto-empe':     {nome:'Rosto — em pé',       formato:'9:16 15–30s, ritmo rápido',            porque:'Em pé = energia, urgência, comando. Ideal p/ ofertas, lives e ação.'},
  'rosto-sentado':  {nome:'Rosto — sentado',     formato:'Câmera na altura dos olhos, 16:9/1:1', porque:'Sentado = proximidade e confiança olho no olho. Bom p/ consideração.'},
  'vsl':            {nome:'VSL (longo)',         formato:'16:9 ou 1:1, 3–20 min, rosto sentado', porque:'Estrutura problema→solução→prova→oferta→CTA agendar.'},
  'demonstracao':   {nome:'Demonstração',        formato:'Tela + narração, 30–90s',              porque:'Prova visual da plataforma/resultados reduz objeção.'},
  'comunicado':     {nome:'Comunicado segmentado',formato:'Meio-corpo, 20–40s, segmento no hook', porque:'Tom de aviso direto cria pertencimento ("é com você").'},
  'ugc':            {nome:'Bastidor / espontâneo (UGC)', formato:'9:16 vertical, sem produção, 15–40s', porque:'Sem olhar p/ câmera, parece conteúdo orgânico/autêntico — tira a "cara de anúncio" e ganha confiança no público frio.'},
};

// Links dos vídeos (Drive / A Voz / YouTube) — viram botões "▶ abrir" no painel.
const D='https://drive.google.com/file/d/', V='https://avoz.solutudo.com.br/videos/';
const LINKS = {
  c1:[{l:'▶ Drive',u:D+'1yySUEMhADXym9TIv0wWEBi_n-wkHjv7x/view'}],
  c2:[{l:'▶ Drive',u:D+'1uGZakTe0Jnu7FmQRBa8CEeA40W2fV5KN/view'}],
  c3:[{l:'▶ Drive',u:D+'1SGfzOApCckIztNkH8yU5_wRCyaK-0Go3/view'}],
  c4:[{l:'▶ Drive',u:D+'1TzMwo5bKT-uk8t-lxqrhjd6dgolGKRa1/view'}],
  c5:[{l:'▶ Drive',u:D+'18VBeH5XtFGJnbHF1J3ozAmGKf6qP96Bd/view'}],
  c6:[{l:'▶ Drive',u:D+'1vVzNi_QWlVYNeZhvdtCDjyzRZi6I_EDX/view'}],
  c7:[{l:'▶ Drive',u:D+'1YCoByAHY6SAry_xDy3YHghCd2vEKFtek/view'}],
  c8:[{l:'▶ Drive',u:D+'1P0efa70Zb-5tppou_lwaF7dkxLRZ8n_B/view'},{l:'▶ A Voz',u:V+'300101'}],
  c9:[{l:'▶ Drive',u:D+'12btuFCg6h9c1v4sKpdJ0Euy3epRNvZDp/view'},{l:'▶ A Voz',u:V+'300101'}],
  c10:[{l:'▶ A Voz',u:V+'720102'}],
  c11:[{l:'▶ Drive',u:D+'1aAoG0TbYZW4jj6E7nwie-cFSO7kB4ooZ/view'}],
  c12:[{l:'▶ A Voz',u:V+'990101'}],
  c13:[{l:'▶ Drive',u:D+'1oQYb7qI1eV11Mp1en6KQj04Ng7DvJ8w3/view'},{l:'▶ A Voz',u:V+'1050101'}],
  c14:[{l:'▶ Drive',u:D+'1zD--CWOOCpt2oHyJWg5maRXUzb4Wi3cG/view'}],
  c15:[{l:'▶ A Voz',u:V+'1230101'}],
  c16:[{l:'▶ Drive',u:D+'1EttIcDVtcTTy3tqRjzfBX76AvBlKrSyN/view'}],
  c17:[{l:'▶ A Voz',u:V+'1350101'}],
  c18:[{l:'▶ A Voz',u:V+'1290101'}],
  c19:[{l:'▶ Drive',u:D+'1XSFMM-1WDSmtWpKjK8TjHOMUXMUwJoVl/view'},{l:'▶ A Voz',u:V+'1380101'}],
  c20:[{l:'▶ Drive',u:D+'1nDNE1-4oKKNEqylIdfAJycPSm-N3VajI/view'}],
  c21:[{l:'▶ Drive',u:D+'1QVa4qZ4jDYXxLceweUVWGr0IXnCM0lrY/view'},{l:'▶ A Voz',u:V+'660107'}],
  c22:[{l:'▶ A Voz',u:V+'1590101'}],
  c23:[{l:'▶ A Voz',u:V+'1620101'}],
  c24:[{l:'▶ YouTube',u:'https://www.youtube.com/watch?v=TNvpFwNXzDw'}],
};

// Os cards (vídeos). Mínimo: id, nome, funcao, jornada, status.
const CARDS = [
  {id:'c1',  nome:'Problema do tráfego pago / IA', funcao:'AD', jornada:'WHATSAPP',   etapa:'Topo',        publico:'Frio (já faz/considera tráfego pago)', estilo:'storytelling', status:'existe', resumo:'Conscientização: o erro de quem faz tráfego pago é investir na "cobertura" sem cuidar da "fundação" (site, Google, Instagram, guias). CTA de DIAGNÓSTICO ("como sua empresa está") → não é venda direta. Ideal: Click-to-WhatsApp ou página de agendamento. Bot roteia: caso complexo → call com consultor (high); simples → venda automática (low). NÃO usar como criativo de checkout direto.'},
  {id:'c3',  nome:'O que é Solutudo?',             funcao:'AD', jornada:'ATRACAO',    etapa:'Topo',        publico:'Frio',       estilo:'storytelling',  status:'existe', resumo:'Explica a missão: ajuda pessoas a escolherem e empresas a serem escolhidas. "Não é marketing digital, é verdade digital." Mesmo quem vive de indicação perde cliente sem estar no digital (90% checam online antes de escolher).'},
  {id:'c10', nome:'Quando as pessoas procuram',    funcao:'AD', jornada:'ATRACAO',    etapa:'Topo',        publico:'Frio',       estilo:'storytelling',  status:'confirmar'},
  {id:'c12', nome:'Tá vendo aquela cena ali',      funcao:'AD', jornada:'ATRACAO',    etapa:'Topo',        publico:'Frio',       estilo:'storytelling',  status:'confirmar'},
  {id:'c24', nome:'Escanteio e cabecear (YouTube)',funcao:'AD', jornada:'ATRACAO',    etapa:'Topo',        publico:'Frio',       estilo:'storytelling',  status:'confirmar'},

  {id:'c2',  nome:'Dá pra confiar na Solutudo?',   funcao:'AD', jornada:'CONFIANCA',  etapa:'Meio',        publico:'Morno',      estilo:'rosto-sentado', status:'existe', resumo:'Quebra de objeção de confiança (~4min, conversa olho no olho). Provas: desde 2005, topo do Reclame Aqui, 4 mi/mês, 3.000+ clientes, mídia (Exame/Estadão), Sebrae 10 anos, sem multa de cancelamento, telefone direto do dono, parceiros há 20 anos.'},
  {id:'c11', nome:'Olha no meu olho (longo)',      funcao:'AD', jornada:'CONFIANCA',  etapa:'Meio',        publico:'Morno',      estilo:'rosto-sentado', status:'existe', resumo:'"Olha bem no meu olho" — vídeo longo de confiança (~3min). Empatia com o pequeno empresário, imprevisibilidade da indicação, 90% decidem no digital, "curtida não paga boleto". CTA: reunião + plano gratuito → porta p/ agendamento/high ticket.'},
  {id:'c22', nome:'Cota: ganhar ou perder',        funcao:'AD', jornada:'CONFIANCA',  etapa:'Meio',        publico:'Morno',      estilo:'rosto-empe',    status:'confirmar'},
  {id:'c23', nome:'Cataclisma de confiança',       funcao:'AD', jornada:'CONFIANCA',  etapa:'Meio',        publico:'Morno',      estilo:'rosto-sentado', status:'confirmar'},

  {id:'c5',  nome:'Cadastro grátis — cidades',     funcao:'AD', jornada:'CADASTRO',   etapa:'Meio',        publico:'Frio',       estilo:'ugc',           status:'existe', resumo:'Formato bastidor/espontâneo ("tá gravando já?", sem olhar p/ câmera). Destaca 4 mi de pessoas procurando prestadores na Solutudo e que dá p/ cadastrar a empresa de graça, rápido, no botão de cadastro grátis.'},
  {id:'c6',  nome:'Cadastro grátis — último mês',  funcao:'AD', jornada:'CADASTRO',   etapa:'Meio',        publico:'Frio',       estilo:'rosto-empe',    status:'existe', obs:'urgência/prova de volume', resumo:'Prova de volume + CTA de cadastro grátis: "só no último mês, +4 mi entraram p/ procurar empresas/prestadores locais". Pergunta: você estava lá? Cadastro é gratuito e rápido. CTA: clica e cadastre.'},
  {id:'c7',  nome:'Cadastro grátis — variação',    funcao:'AD', jornada:'CADASTRO',   etapa:'Meio',        publico:'Frio',       estilo:'rosto-empe',    status:'existe', obs:'variação do c6', resumo:'Variação do c6 (mesma oferta de cadastro grátis). Fecha com gancho de upsell: "se quiser melhorar seu cadastro, aí é outra história" — ponte p/ plano pago.'},
  {id:'c13', nome:'Cadastro — construção civil',   funcao:'AD', jornada:'CADASTRO',   etapa:'Meio',        publico:'Constr. civil', estilo:'comunicado', status:'existe', resumo:'Comunicado direto à construção civil (pedreiro, pintor, encanador, mecânico, construtor…). +4 mi de acessos/mês procurando; cadastro gratuito no "maior guia de empresas do Brasil". CTA: clica e cadastre agora.'},
  {id:'c15', nome:'Cadastro — constr. civil (2)',  funcao:'AD', jornada:'CADASTRO',   etapa:'Meio',        publico:'Constr. civil', estilo:'comunicado', status:'confirmar'},
  {id:'CAD-PG', nome:'Vídeo da página de cadastro',funcao:'PG', jornada:'CADASTRO',   etapa:'Meio',        publico:'—',          estilo:'rosto-sentado', status:'confirmar', obs:'avaliar se vale produzir'},

  {id:'c8',  nome:'Mundo mudando — chamada live',  funcao:'AD', jornada:'LIVE',       etapa:'Topo/Meio',   publico:'Frio/Morno', estilo:'rosto-empe',    status:'confirmar'},
  {id:'c9',  nome:'Convite p/ conteúdo (live)',    funcao:'AD', jornada:'LIVE',       etapa:'Topo/Meio',   publico:'Frio/Morno', estilo:'rosto-empe',    status:'confirmar'},
  {id:'c14', nome:'Fachadas do velho mundo (live)',funcao:'AD', jornada:'LIVE',       etapa:'Topo/Meio',   publico:'Frio/Morno', estilo:'storytelling',  status:'confirmar'},
  {id:'c21', nome:'Guia "como ser escolhido 2026"',funcao:'AD', jornada:'LIVE',       etapa:'Topo/Meio',   publico:'Frio/Morno', estilo:'storytelling',  status:'confirmar'},

  {id:'c19', nome:'Constr. civil — via WhatsApp',  funcao:'AD', jornada:'WHATSAPP',   etapa:'Meio/Fundo',  publico:'Constr. civil', estilo:'comunicado', status:'confirmar'},

  {id:'VSL-PG', nome:'Vídeo da VSL',               funcao:'PG', jornada:'VSL',        etapa:'Fundo',       publico:'Morno/Quente', estilo:'vsl',         status:'falta',     obs:'PRIORIDADE — bloqueia high ticket'},

  {id:'c4',  nome:'Menos de R$1 por dia',          funcao:'AD', jornada:'ANUNCIE',    etapa:'Fundo',       publico:'Frio/Morno', estilo:'rosto-empe',    status:'existe', resumo:'Agita a dor ("você tem que aparecer no Google, Instagram, Solutudo, criar conteúdo sempre…") + "o melhor lugar p/ esconder o corpo é a 2ª página do Google". Oferta: a Solutudo faz por você. CTA: clica p/ entender, a partir de R$1/dia.'},

  {id:'c16', nome:'Remarketing constr. civil',     funcao:'AD', jornada:'REMARKETING',etapa:'Remarketing', publico:'Quente',     estilo:'rosto-empe',    status:'confirmar'},
  {id:'c17', nome:'Remarketing — página anuncie',  funcao:'AD', jornada:'REMARKETING',etapa:'Remarketing', publico:'Quente',     estilo:'rosto-empe',    status:'confirmar'},
  {id:'c18', nome:'Remarketing — não cadastrou',   funcao:'AD', jornada:'REMARKETING',etapa:'Remarketing', publico:'Morno/Quente', estilo:'rosto-empe',  status:'confirmar'},
  {id:'c20', nome:'Remarketing — anuncie (2)',     funcao:'AD', jornada:'REMARKETING',etapa:'Remarketing', publico:'Quente',     estilo:'rosto-empe',    status:'confirmar'},
];

/* ============ RENDER ============ */
const COR = {existe:'#2ea043', confirmar:'#d29922', falta:'#e5534b'};

const elements = [{data:{id:'ROOT', label:'FUNIL\nSOLUTUDO', tipo:'root'}}];
for(const j in JORNADAS){
  elements.push({data:{id:j, label:JORNADAS[j].nome, tipo:'jornada'}});
  elements.push({data:{id:'e_'+j, source:'ROOT', target:j}});
}
for(const c of CARDS){
  elements.push({data:{id:c.id, label:c.id+'  '+c.nome, tipo:'card', status:c.status, ref:c.id}});
  elements.push({data:{id:'e_'+c.id, source:c.jornada, target:c.id}});
}

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements,
  style:[
    {selector:'node', style:{'label':'data(label)','color':'#e6edf3','font-size':'11px','text-wrap':'wrap','text-max-width':'130px','text-valign':'center','text-halign':'center'}},
    {selector:'node[tipo="root"]', style:{'background-color':'#388bfd','shape':'round-rectangle','width':'110px','height':'70px','font-size':'14px','font-weight':'bold','text-outline-color':'#388bfd','text-outline-width':2}},
    {selector:'node[tipo="jornada"]', style:{'background-color':'#30363d','shape':'round-rectangle','width':'140px','height':'46px','border-width':1,'border-color':'#4b5563','font-weight':'600'}},
    {selector:'node[tipo="card"]', style:{'background-color':ele=>COR[ele.data('status')]||'#6e7681','shape':'round-rectangle','width':'150px','height':'40px','text-max-width':'140px'}},
    {selector:'edge', style:{'width':1.5,'line-color':'#39414d','curve-style':'bezier','target-arrow-shape':'none','opacity':.7}},
    {selector:'node:selected', style:{'border-width':3,'border-color':'#fff'}},
  ],
  layout:{name:'breadthfirst', directed:true, roots:['ROOT'], spacingFactor:1.05, padding:40},
  wheelSensitivity:0.25,
});

function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}

function showCard(c){
  const j = JORNADAS[c.jornada]||{}; const e = ESTILOS[c.estilo]||{};
  const sLabel = {existe:'✅ existe', confirmar:'🟡 a confirmar', falta:'⛔ falta produzir'}[c.status];
  document.getElementById('side').innerHTML = `
    <h2>${esc(c.id)} — ${esc(c.nome)}</h2>
    <span class="tag">${c.funcao==='AD'?'AD · anúncio':'PG · vídeo de página'}</span>
    <span class="tag">${esc(j.nome||c.jornada)}</span>
    <span class="tag status-${c.status}">${sLabel}</span>
    ${c.resumo?`<p>${esc(c.resumo)}</p>`:''}
    ${(LINKS[c.id]||[]).length?`<div style="margin:8px 0">${(LINKS[c.id]||[]).map(x=>`<a class="vbtn" href="${x.u}" target="_blank" rel="noopener">${esc(x.l)}</a>`).join('')}</div>`:''}
    <div class="kv"><b>Etapa:</b> ${esc(c.etapa||'—')}</div>
    <div class="kv"><b>Público:</b> ${esc(c.publico||'—')}</div>
    ${c.obs?`<div class="kv"><b>Obs:</b> ${esc(c.obs)}</div>`:''}

    <h3>🎬 Criativo recomendado</h3>
    <div class="kv"><b>Estilo:</b> ${esc(e.nome||c.estilo||'—')}</div>
    <div class="kv"><b>Formato:</b> ${esc(e.formato||'—')}</div>
    <p>${esc(e.porque||'')}</p>

    <h3>📣 Plataformas / campanha</h3>
    <div class="kv"><b>Meta:</b> ${esc(j.meta||'—')}</div>
    <div class="kv"><b>Google:</b> ${esc(j.google||'—')}</div>
    <div class="kv"><b>YouTube:</b> ${esc(j.youtube||'—')}</div>
    <div class="kv"><b>KPI:</b> ${esc(j.kpi||'—')}</div>
  `;
}
function showJornada(id){
  const j = JORNADAS[id]; const n = CARDS.filter(c=>c.jornada===id).length;
  document.getElementById('side').innerHTML = `
    <h2>${esc(j.nome)}</h2>
    <span class="tag">${n} criativo(s)</span>
    <h3>📣 Plataformas / campanha</h3>
    <div class="kv"><b>Meta:</b> ${esc(j.meta)}</div>
    <div class="kv"><b>Google:</b> ${esc(j.google)}</div>
    <div class="kv"><b>YouTube:</b> ${esc(j.youtube)}</div>
    <div class="kv"><b>KPI:</b> ${esc(j.kpi)}</div>
    <p class="hint">Clique em um card deste ramo para ver o detalhe do vídeo.</p>`;
}
cy.on('tap','node', e=>{
  const d = e.target.data();
  if(d.tipo==='card') showCard(CARDS.find(c=>c.id===d.ref));
  else if(d.tipo==='jornada') showJornada(d.id);
  else document.getElementById('side').innerHTML='<p style="color:#9aa7b4">Clique num ramo ou card.</p>';
});
</script>
</body>
</html>
